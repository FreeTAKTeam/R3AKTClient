<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>RCH - Navigation Drawer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#25d1f4",
                        "background-light": "#f5f8f8",
                        "background-dark": "#101f22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .nav-item-active {
            background: linear-gradient(90deg, rgba(37, 209, 244, 0.15) 0%, rgba(37, 209, 244, 0) 100%);
            border-left: 3px solid #25d1f4;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<!-- Translucent Overlay Container -->
<div class="fixed inset-0 z-50 flex bg-slate-900/60 backdrop-blur-sm">
<!-- Navigation Drawer -->
<div class="relative flex h-full w-72 flex-col bg-background-dark border-r border-primary/20 shadow-2xl shadow-primary/10">
<!-- Header with Logo -->
<div class="flex items-center gap-3 p-6 mb-2">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary/10 border border-primary/30">
<span class="material-symbols-outlined text-primary text-2xl" style="">hub</span>
</div>
<div class="flex flex-col">
<h1 class="text-sm font-bold tracking-wider text-slate-100 uppercase" style="">R3AKT</h1>
<p class="text-[10px] font-medium text-primary/80 uppercase tracking-widest" style="">Community Hub</p>
</div>
</div>
<!-- Scrollable Navigation Area -->
<div class="flex-1 overflow-y-auto px-3">
<nav class="flex flex-col gap-1">
<!-- Home -->
<a class="nav-item-active group flex h-11 items-center gap-4 rounded-r-lg px-3 text-primary transition-colors" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">home</span>
<span class="text-sm font-semibold" style="">Home</span>
</a>
<!-- Missions -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">target</span>
<span class="text-sm font-medium" style="">Missions</span>
</a>
<!-- Checklists -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">checklist</span>
<span class="text-sm font-medium" style="">Checklists</span>
</a>
<!-- Webmap -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">map</span>
<span class="text-sm font-medium" style="">Webmap</span>
</a>
<div class="my-3 mx-4 border-t border-primary/10"></div>
<!-- Topics -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">tag</span>
<span class="text-sm font-medium" style="">Topics</span>
</a>
<!-- Files -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">folder_open</span>
<span class="text-sm font-medium" style="">Files</span>
</a>
<!-- Chat -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">chat_bubble</span>
<span class="text-sm font-medium" style="">Chat</span>
</a>
<!-- Users -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">group</span>
<span class="text-sm font-medium" style="">Users</span>
</a>
<div class="my-3 mx-4 border-t border-primary/10"></div>
<!-- Configure -->

<span class="material-symbols-outlined text-[22px]" style="">settings</span>
<span class="text-sm font-medium" style="">Configure</span>
</a>
<!-- Connect -->

<span class="material-symbols-outlined text-[22px]" style="">link</span>
<span class="text-sm font-medium" style="">Connect</span>
</a>
<!-- About -->
<a class="group flex h-11 items-center gap-4 rounded-lg px-3 text-slate-400 hover:bg-primary/10 hover:text-primary transition-all" href="#" style="">
<span class="material-symbols-outlined text-[22px]" style="">info</span>
<span class="text-sm font-medium" style="">About</span>
</a>

</div>
<div class="flex flex-col">
<span class="text-xs font-bold text-slate-100" style="">Operator_01</span>
<span class="text-[10px] text-primary/70 uppercase" style="">Connected</span>
</div>
<button class="ml-auto text-slate-400 hover:text-primary" style="">
<span class="material-symbols-outlined" style="">logout</span>
</button>
</div>
</div>
</div>
<!-- Remaining screen space (clickable area to close) -->
<div class="flex-1 cursor-pointer"></div>
</div>
<!-- Background Content Mockup -->
<div class="p-8">
<h2 class="text-2xl font-bold mb-4" style="">Dashboard Overview</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="h-40 rounded-xl bg-background-light dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10"></div>
<div class="h-40 rounded-xl bg-background-light dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10"></div>
<div class="h-40 rounded-xl bg-background-light dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10"></div>
</div>
<div class="mt-8 h-96 rounded-xl bg-background-light dark:bg-slate-800/50 border border-slate-200 dark:border-primary/10 overflow-hidden">
<div class="h-full w-full bg-slate-900 flex items-center justify-center">
<span class="text-primary/20 text-4xl font-bold italic" style="">MAP INTERFACE</span>
</div>
</div>
