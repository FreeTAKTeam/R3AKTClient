name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation-gates:
    name: Validation Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout LXMF-rs
        uses: actions/checkout@v4
        with:
          repository: FreeTAKTeam/LXMF-rs
          ref: 0052218f1247c68f8c925988299d33d0678d81b4
          path: LXMF-rs

      - name: Link LXMF-rs sibling path
        run: ln -sfn "$GITHUB_WORKSPACE/LXMF-rs" "$GITHUB_WORKSPACE/../LXMF-rs"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-validation-gates

      - name: npm ci
        run: npm ci

      - name: cargo check -p reticulum_mobile
        run: cargo check -p reticulum_mobile

      - name: npm run node-client:build
        run: npm run node-client:build

      - name: npm run mobile:build
        run: npm run mobile:build

      - name: npm run check:client-operations
        run: npm run check:client-operations
